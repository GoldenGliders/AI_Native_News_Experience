<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI-Native News Portal</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">AI-News</div>
  <div class="header-actions">
    <input type="text" id="searchNews" placeholder="Search news..." />
    <button id="toggleDark">🌙</button>
  </div>
</header>

<!-- Main Layout -->
<main class="portal-layout">

  <!-- News Feed -->
  <section class="news-section">
    <h2>Top Stories</h2>
    <div id="newsContainer"></div>
  </section>

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Flashcards always on top -->
    <section class="flashcards-section">
      <h3>Flashcards</h3>
      <div id="flashcardsContainer"></div>
    </section>

    <!-- Ask question below flashcards -->
    <section class="question-section">
      <h3>Ask About News</h3>
      <input type="text" id="questionInput" placeholder="Type your question..." />
      <select id="newsSelect"></select>
      <button onclick="askQuestion()">Ask</button>
      <div id="answerBox"></div>
    </section>
  </aside>

</main>

<footer>
  <p>© 2026 AI News Experience</p>
</footer>

<script src="/script.js"></script>
</body>
</html>
